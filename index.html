<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First GitHub Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      color: white;
      margin-top: 100px;
    }

    .box {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Hello GitHub 👋</h1>
    <p>This is my first deployed HTML page.</p>

    <button onclick="changeText()">Click Me</button>

    <p id="msg"></p>
  </div>

  <script>
    function changeText() {
      document.getElementById("msg").innerText =
        "🚀 Deployed successfully on GitHub Pages!";
    }
  </script>
</body>
</html>
