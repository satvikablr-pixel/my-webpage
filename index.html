<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        header {
            background: #1e293b;
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        section {
            padding: 40px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<header>
    <h1>My Website 🚀</h1>
</header>

<section>
    <h2>Welcome!</h2>
    <p>This is my first webpage hosted on GitHub.</p>
    <button onclick="showMessage()">Click Me</button>
</section>

<script>
    function showMessage() {
        alert("Hello! Your website is working 🎉");
    }
</script>

</body>
</html>
